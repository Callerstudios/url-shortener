<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>URL Shortener</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;min-height:100vh;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;padding:24px;color:#fff}
.card{width:min(900px,100%);background:rgba(255,255,255,.12);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:32px}
h1{text-align:center;font-size:2.5rem}.sub{text-align:center;opacity:.9;margin:10px 0 24px}
.section{margin:24px 0}input{width:100%;padding:14px;border:none;border-radius:10px;margin:10px 0;color:#222}
button,.btn{padding:12px 18px;border:none;border-radius:10px;background:#fff;color:#2563eb;font-weight:bold;cursor:pointer;margin-right:10px}
button:hover,.btn:hover{opacity:.9}
.result{display:none;background:rgba(255,255,255,.1);padding:16px;border-radius:10px;margin-top:15px}
.code{background:#111827;padding:10px;border-radius:8px;font-family:monospace;overflow:auto}
.small{opacity:.85;font-size:.9rem}
#toast{position:fixed;top:20px;right:20px;background:#111827;color:#fff;padding:12px 16px;border-radius:8px;display:none}
</style></head>
<body>
<div class="card">
<h1>🔗 URL Shortener</h1>
<p class="sub">Shorten links instantly and retrieve the original URL.</p>

<div class="section">
<h2>Create Short URL</h2>
<input id="urlInput" type="url" placeholder="https://example.com/some/very/long/url">
<button onclick="shorten()">Shorten URL</button>
<div id="shortBox" class="result">
<p class="small">Generated URL</p>
<input id="shortUrl" readonly>
<button onclick="copy()">Copy</button>
<a id="openBtn" class="btn" target="_blank">Open</a>
</div>
</div>

<div class="section">
<h2>Lookup Original URL</h2>
<input id="lookupInput" placeholder="Enter short code (e.g. abc1234)">
<button onclick="lookup()">Lookup</button>
<div id="lookupBox" class="result">
<p><strong>Original URL</strong></p>
<p id="original"></p>
</div>
</div>

<div class="section">
<h2>API</h2>
<div class="code">POST /shorten {"url":"https://example.com"}</div><br>
<div class="code">GET /view/:shortCode</div><br>
<div class="code">GET /:shortCode</div>
</div>
</div>
<div id="toast"></div>
<script>
function toast(msg){
 const t=document.getElementById('toast');
 t.textContent=msg;t.style.display='block';
 setTimeout(()=>t.style.display='none',2500);
}
async function shorten(){
 const url=document.getElementById('urlInput').value.trim();
 if(!url){toast('Enter a URL');return;}
 const r=await fetch('/shorten',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
 const d=await r.json();
 if(!r.ok){toast(d.message||'Error');return;}
 document.getElementById('shortBox').style.display='block';
 document.getElementById('shortUrl').value=d.shortUrl;
 document.getElementById('openBtn').href=d.shortUrl;
 toast('Short URL created');
}
async function lookup(){
 const code=document.getElementById('lookupInput').value.trim();
 if(!code){toast('Enter a short code');return;}
 const r=await fetch('/view/'+encodeURIComponent(code));
 const d=await r.json();
 if(!r.ok){toast(d.message||'Not found');return;}
 document.getElementById('lookupBox').style.display='block';
 document.getElementById('original').textContent=d.originalUrl;
}
async function copy(){
 await navigator.clipboard.writeText(document.getElementById('shortUrl').value);
 toast('Copied to clipboard');
}
</script>
</body></html>
